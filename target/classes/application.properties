spring.application.name=core-microservice

# ============================================================
# Server
# ============================================================
server.port=${PORT:8081}

# ============================================================
# Oracle Autonomous DB (Wallet)
# ============================================================
spring.datasource.url=jdbc:oracle:thin:@atpmariano_high
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.hikari.data-source-properties.oracle.net.tns_admin=${WALLET_PATH:${user.dir}/wallet}

# ============================================================
# HikariCP - Connection pool
# ============================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_schema=APP_COREFINAN
spring.jpa.open-in-view=false

# ============================================================
# Jackson
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ============================================================
# HTTP Clients
# ============================================================
clients.auth.base-url=${AUTH_BASE_URL:http://localhost:8080}
clients.auth.connect-timeout-ms=${AUTH_CONNECT_TIMEOUT_MS:2000}
clients.auth.read-timeout-ms=${AUTH_READ_TIMEOUT_MS:3000}
